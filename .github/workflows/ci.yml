name: FLU CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONPATH: src

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # UNIT TESTS: Multi-version validation
  # ──────────────────────────────────────────────────────────────────────────
  
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
      
      - name: Run unit tests
        run: |
          python run_tests.py
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results-*.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # BENCHMARKS: Full 13-section validation
  # ──────────────────────────────────────────────────────────────────────────
  
  benchmarks:
    name: Benchmark Suite (13 Sections)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy
      
      - name: Run benchmark suite
        run: |
          python tests/benchmarks/run_benchmark_suite.py --json --verbose
        continue-on-error: true
      
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/latest_suite.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # CODE QUALITY: Linting (informational)
  # ──────────────────────────────────────────────────────────────────────────
  
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black mypy flake8
      
      - name: Check Black formatting
        run: |
          black --check src/ tests/ || echo "Run: black src/ tests/"
      
      - name: MyPy type check
        run: |
          mypy src/flu --ignore-missing-imports || true

  # ──────────────────────────────────────────────────────────────────────────
  # HEALTH REPORT: Aggregate all results
  # ──────────────────────────────────────────────────────────────────────────
  
  health-report:
    name: Project Health Report
    runs-on: ubuntu-latest
    needs: [test, benchmarks, quality]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate health report
        run: |
          python -c "
          import json
          from datetime import datetime
          
          jobs = {
              'test': '${{ needs.test.result }}',
              'benchmarks': '${{ needs.benchmarks.result }}',
              'quality': '${{ needs.quality.result }}'
          }
          
          critical_failures = sum(1 for k, v in jobs.items() if v == 'failure' and k in 'test')
          status = 'healthy' if critical_failures == 0 else 'warning'
          
          report = {
              'timestamp': datetime.utcnow().isoformat() + 'Z',
              'status': status,
              'jobs': jobs,
              'critical_failures': critical_failures
          }
          
          print('\n' + '='*72)
          print('FLU CI/CD Health Report')
          print('='*72)
          for job, result in jobs.items():
              icon = '✓' if result == 'success' else ('⚠' if result == 'skipped' else '✗')
              critical = ' (CRITICAL)' if job in 'test' and result == 'failure' else ''
              print(f'  {icon}  {job:<20} {result}{critical}')
          print('='*72)
          print(f'Status: {status.upper()} | Critical Failures: {critical_failures}')
          print('='*72 + '\n')
          
          with open('health-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          "
      
      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: health-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # FINAL STATUS: Enforce critical job success
  # ──────────────────────────────────────────────────────────────────────────
  
  final-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [test, benchmarks]
    if: always()
    
    steps:
      - name: Check critical jobs
        run: |
          echo "CI Status Check"
          echo "==============="
          
          TEST_STATUS="${{ needs.test.result }}"          
          BENCHMARKS_STATUS="${{ needs.benchmarks.result }}"
          
          echo "Unit Tests:    $TEST_STATUS"
          echo "Benchmarks:    $BENCHMARKS_STATUS"
          
          if [ "$TEST_STATUS" != "success" ]; then
            echo ""
            echo "❌ Unit tests failed - blocking merge"
            exit 1
          fi
                    
          echo ""
          echo "✅ All critical checks passed"
