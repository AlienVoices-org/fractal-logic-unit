name: FLU CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONPATH: src

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # UNIT TESTS: Multi-version validation
  # ──────────────────────────────────────────────────────────────────────────
  
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
      
      - name: Run unit tests
        run: |
          python run_tests.py
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results-*.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # BENCHMARKS: Full 13-section validation
  # ──────────────────────────────────────────────────────────────────────────
  
  benchmarks:
    name: Benchmark Suite (13 Sections)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy
      
      - name: Run benchmark suite
        run: |
          python tests/benchmarks/run_benchmark_suite.py --json --verbose
        continue-on-error: true
      
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/latest_suite.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # THEOREM REGISTRY: Auto-generate and validate
  # ──────────────────────────────────────────────────────────────────────────
  
  registry:
    name: Theorem Registry Validation & Generation
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
      
      - name: Verify registry matches source
        run: |
          python tools/generate_registry_json.py --verify
      
      - name: Regenerate THEOREM_REGISTRY.json
        run: |
          python tools/generate_registry_json.py
      
      - name: Check if registry changed
        id: registry-check
        run: |
          if git diff --quiet src/flu/theory/THEOREM_REGISTRY.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --no-color src/flu/theory/THEOREM_REGISTRY.json | head -50
          fi
      
      - name: Commit registry changes (if on main push)
        if: steps.registry-check.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions Bot"
          git add src/flu/theory/THEOREM_REGISTRY.json
          git commit -m "chore: update THEOREM_REGISTRY.json [skip ci]"
          git push origin main
      
      - name: Report registry status on PR
        if: github.event_name == 'pull_request' && steps.registry-check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Theorem Registry out of sync**\n\nThe `THEOREM_REGISTRY.json` file differs from the live Python registry. Run:\n```bash\npython tools/generate_registry_json.py\ngit add src/flu/theory/THEOREM_REGISTRY.json\ngit commit -m "chore: update THEOREM_REGISTRY.json"\n```'
            });

  # ──────────────────────────────────────────────────────────────────────────
  # CODE QUALITY: Linting (informational)
  # ──────────────────────────────────────────────────────────────────────────
  
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black mypy flake8
      
      - name: Check Black formatting
        run: |
          black --check src/ tests/ || echo "Run: black src/ tests/"
      
      - name: MyPy type check
        run: |
          mypy src/flu --ignore-missing-imports || true

  # ──────────────────────────────────────────────────────────────────────────
  # HEALTH REPORT: Aggregate all results
  # ──────────────────────────────────────────────────────────────────────────
  
  health-report:
    name: Project Health Report
    runs-on: ubuntu-latest
    needs: [test, benchmarks, registry, quality]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true
      
      - name: Generate health report
        run: |
          python -c "
          import json
          from datetime import datetime
          
          jobs = {
              'test': '${{ needs.test.result }}',
              'benchmarks': '${{ needs.benchmarks.result }}',
              'registry': '${{ needs.registry.result }}',
              'quality': '${{ needs.quality.result }}'
          }
          
          critical_failures = sum(1 for v in jobs.values() if v == 'failure')
          status = 'healthy' if critical_failures == 0 else 'warning'
          
          report = {
              'timestamp': datetime.utcnow().isoformat() + 'Z',
              'status': status,
              'jobs': jobs,
              'critical_failures': critical_failures
          }
          
          print('\\n' + '='*72)
          print('FLU CI/CD Health Report')
          print('='*72)
          for job, result in jobs.items():
              icon = '✓' if result == 'success' else ('⚠' if result == 'skipped' else '✗')
              print(f'  {icon}  {job:<20} {result}')
          print('='*72)
          print(f'Status: {status.upper()} | Critical Failures: {critical_failures}')
          print('='*72 + '\\n')
          
          with open('health-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          "
      
      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: health-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # FINAL STATUS: Enforce critical job success
  # ──────────────────────────────────────────────────────────────────────────
  
  final-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [test, benchmarks, registry]
    if: always()
    
    steps:
      - name: Check critical jobs
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.benchmarks.result }}" = "failure" ]; then
            echo "❌ Benchmarks failed"
            exit 1
          fi
          if [ "${{ needs.registry.result }}" != "success" ]; then
            echo "❌ Registry validation failed"
            exit 1
          fi
          echo "✅ All critical checks passed"
